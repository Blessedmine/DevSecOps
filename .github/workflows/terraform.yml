name: Terraform Pipeline

on:
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - 'terraform/**'
  pull_request:
    branches:
      - dev
      - staging
      - main
    paths:
      - 'terraform/**'

env:
  AWS_REGION: us-east-1
  TF_STATE_BUCKET: devsecops-tfstate-495599739945

jobs:
  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Run Checkov IaC Scan
        run: |
          pip install checkov
          checkov -d terraform/ --quiet || true

  terraform-plan-dev:
    name: Plan Dev
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.ref == 'refs/heads/dev' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan Dev
        working-directory: terraform
        run: |
          terraform workspace select dev || terraform workspace new dev
          terraform plan -var-file=environments/dev.tfvars -out=dev.tfplan

      - name: Upload Dev Plan
        uses: actions/upload-artifact@v4
        with:
          name: dev-tfplan
          path: terraform/dev.tfplan

  terraform-apply-dev:
    name: Apply Dev
    runs-on: ubuntu-latest
    needs: terraform-plan-dev
    if: github.ref == 'refs/heads/dev'
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Dev Plan
        uses: actions/download-artifact@v4
        with:
          name: dev-tfplan
          path: terraform/

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply Dev
        working-directory: terraform
        run: |
          terraform workspace select dev
          terraform apply -auto-approve dev.tfplan

  terraform-plan-staging:
    name: Plan Staging
    runs-on: ubuntu-latest
    needs: terraform-apply-dev
    if: github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan Staging
        working-directory: terraform
        run: |
          terraform workspace select staging || terraform workspace new staging
          terraform plan -var-file=environments/staging.tfvars -out=staging.tfplan

      - name: Upload Staging Plan
        uses: actions/upload-artifact@v4
        with:
          name: staging-tfplan
          path: terraform/staging.tfplan

  terraform-apply-staging:
    name: Apply Staging
    runs-on: ubuntu-latest
    needs: terraform-plan-staging
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Staging Plan
        uses: actions/download-artifact@v4
        with:
          name: staging-tfplan
          path: terraform/

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply Staging
        working-directory: terraform
        run: |
          terraform workspace select staging
          terraform apply -auto-approve staging.tfplan

  terraform-plan-prod:
    name: Plan Prod
    runs-on: ubuntu-latest
    needs: terraform-apply-staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan Prod
        working-directory: terraform
        run: |
          terraform workspace select prod || terraform workspace new prod
          terraform plan -var-file=environments/prod.tfvars -out=prod.tfplan

      - name: Upload Prod Plan
        uses: actions/upload-artifact@v4
        with:
          name: prod-tfplan
          path: terraform/prod.tfplan

  terraform-apply-prod:
    name: Apply Prod
    runs-on: ubuntu-latest
    needs: terraform-plan-prod
    if: github.ref == 'refs/heads/main'
    environment:
      name: prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Prod Plan
        uses: actions/download-artifact@v4
        with:
          name: prod-tfplan
          path: terraform/

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply Prod
        working-directory: terraform
        run: |
          terraform workspace select prod
          terraform apply -auto-approve prod.tfplan